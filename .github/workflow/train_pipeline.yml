name: FUT Price Pipeline

on:
  workflow_dispatch:       # Allows manual triggering only (no automatic runs)

jobs:
  run-pipeline:
    runs-on: ubuntu-latest # Use GitHub’s latest Ubuntu runner environment

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4   # Pulls your repo code into the runner

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"    # Installs Python 3.10 on the runner

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip   # Updates pip
          pip install -r requirements.txt       # Installs all project packages

      - name: Run automation pipeline
        run: |
          python automation.py   # Executes your full scraping + training pipeline

      - name: Upload model artifacts
        if: success()            # Only upload if the pipeline ran successfully
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts  # Name of the artifact bundle in GitHub Actions
          path: |                # Folders to upload for download/inspection
            data/models/
            data/processed/
            data/raw/

